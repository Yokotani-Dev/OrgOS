# OrgOS Export Manifest
# エクスポート対象ファイルの定義
#
# 依存閉包ポリシー (ISS-006 / ISS-007, AUDIT-2026-06-10):
#   配布ファイル（publish/core）が参照する rules / agents / hooks / scripts /
#   schemas / templates は、すべて publish に含める（参照閉包）。
#   閉包は tests/kernel/test-manifest-closure.sh で機械検証する。
#
# 意図的に配布しないもの（理由付き）:
#   - .claude/evals/manager-quality/:
#       gitignored なローカル生成物（USER_PROFILE / CAPABILITIES）を直読みするため
#       配布先で再現不能。run-all.sh は -f ガードで安全にスキップする
#   - .claude/evals/check-oip-format.sh:
#       INTELLIGENCE 変更時のみ実行（run-all.sh の -f ガード済み・OrgOS-Dev 専用）
#   - scripts/goals/update-active-graph.sh:
#       未実装（coherence-mode.md の参照は設計記述のみ, ISS-028）
#   - .ai/_machine/codex/codex-wsl.sh:
#       実体は配布される .ai/TEMPLATES/codex-wsl.sh から導入先で生成する (T-OS-WIN-3)
#   - .claude/rules/_archive/:
#       archive 済み rule は配布しない（残存する死参照は ISS-025 / ISS-030 で修正）

version_file: ".ai/VERSION.yaml"

# rules: /org-import metadata (alphabetical)
rules:
  - agent-coordination
  - ai-driven-development
  - anthropic-aup-compliance
  - authority-layer
  - capability-preflight
  - coherence-mode
  - cross-session-consistency
  - design-documentation
  - domain-constraint-sync
  - handoff-protocol
  - kernel-write-path
  - literacy-adaptation
  - memory-lifecycle
  - next-step-guidance
  - output-management
  - owner-task-minimization
  - parallel-session-policy
  - patterns
  - performance
  - plan-sync
  - proactive-mode
  - project-flow
  - quality-contract
  - rationalization-prevention
  - request-intake-loop
  - secret-management
  - session-bootstrap
  - session-management
  - specialist-subagents
  - user-journey-sync

