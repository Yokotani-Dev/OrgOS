      - "allowed_pathsが未設定のタスクは並列実行禁止とするルールを追加"
    notes: |
      問題: 同じファイルを複数のCodex workerが同時編集してデグレが発生。
      allowed_pathsの衝突チェックが「推奨」レベルだったが「必須」に格上げ。
      ファイルパスのglob比較で重複を検出し、重複があればdepsを自動追加。

  - id: T-OS-072
    title: "Runbook機構: プロジェクトのルーティンワークを手順化・再利用可能にする"
    status: done
    deps: []
    owner_role: "codex-implementer"
    allowed_paths: [".claude/rules/", ".claude/agents/manager.md", ".claude/commands/", ".ai/"]
    acceptance:
      - ".ai/RUNBOOKS/ ディレクトリの仕組みを定義（RUNBOOK_SPEC.md）"
      - "Runbook テンプレート作成（手順・前提条件・検証手順・ロールバック手順を含む）"
      - "manager.md: ルーティンワーク検出時にRunbook参照を必須化"
      - "org-tick.md: 既存Runbookがある作業は自動でRunbookに従って実行するロジック追加"
      - "project-flow.md: 2回以上実行した作業はRunbook化を自動提案するルール追加"
    notes: |
      問題: デプロイ等のルーティンワークが毎回ゼロから検討されるため品質が不安定。
      解決: 初回実行時に手順を .ai/RUNBOOKS/deploy.md 等に記録し、
      2回目以降は同じ手順を機械的に再実行する。
      手順の改善も Runbook を更新する形で蓄積される。

      Runbookの例:
      - deploy.md: デプロイ手順
      - release.md: リリース手順
      - rollback.md: ロールバック手順
      - db-migration.md: DBマイグレーション手順
      - env-setup.md: 環境セットアップ手順

