      - "next-step-guidance.md: 選択肢提示パターンを削減。デフォルトは「次これやります」報告型に変更"
      - "ai-driven-development.md: タスク優先度判断もManager自律に。人間に聞くのは「OrgOSでは判断不可能な情報」のみ"
      - "manager.md ミッション更新: 「Owner に次のアクションを提示」→「自律的に推進し、必要な情報だけ人間に聞く」"
      - "CLAUDE.md: 全体方針を「OrgOS主導、人間は最小介入」に更新"
      - "project-flow.md: 確認フローを簡素化"
    notes: |
      Owner フィードバック: 「OrgOSが人間を巻き込んでやっていく、みたいなスタンスが欲しい」
      「これだけ教えてくれたらあとは自分でタスクにして推進します」

      方針転換:
      - Before: Manager = ナビゲーター、Owner = ドライバー
      - After: Manager = ドライバー、Owner = 必要な時だけ助言するアドバイザー

      具体的変更:
      1. セッション終了提案: ほぼ廃止（95%超の強制終了のみ）
      2. 選択肢提示: 「やります」報告に変更。ビジネス判断のみ例外
      3. 確認フロー: 「進めてOK？」→ 進めて報告する
      4. タスク計画: 人間が考えなくてもOrgOSが自動分解・優先度設定
      5. 人間への質問: 「OrgOSが持っていない情報」だけ

