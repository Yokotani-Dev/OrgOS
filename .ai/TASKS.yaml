  # === OrgOS 自律駆動化: Manager主導→人間は最小介入 (2026-03-31) ===

  - id: T-OS-070
    title: "OrgOS 自律駆動化: Manager が主導し、人間は最小限の介入のみ"
    status: done
    deps: []
    owner_role: "codex-implementer"
    allowed_paths: [".claude/rules/", ".claude/agents/manager.md", "CLAUDE.md"]
    acceptance:
