  - id: T-OS-425
    title: '[Kernel-v2 HARDEN] integrator changed_files redesign: allowed_paths intersect
      approach'
    status: done
    priority: P0
    deps:
      - T-OS-424
    owner_role: codex-implementer
    allowed_paths:
