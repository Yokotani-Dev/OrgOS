vision:
  id: V-ORGOS
  statement: Chief of Staff OrgOS as an integrated operating model that compounds memory, optionality, intake discipline, handoff reliability, and authority-aware execution without storing secrets in tracked state.
  created_at: 2026-04-19
  updated_at: 2026-04-19

milestones:
  - id: M-PHASE-1
    title: Memory
    description: Establish a safe fact registry and lifecycle so the system can remember relevant context without leaking secrets.
    target_date: 2026-04-30
    status: achieved
    vision_ref: V-ORGOS
    acceptance:
      - USER_PROFILE schema and lifecycle rule exist.
      - Secret material is represented by pointers, not plaintext.
  - id: M-PHASE-2
    title: Optionality
    description: Build capability discovery and evaluation primitives so the manager can choose tools instead of asking the owner prematurely.
    target_date: 2026-05-07
    status: active
    vision_ref: V-ORGOS
    acceptance:
      - Capability manifest is machine-readable and reusable.
      - Quality eval can score capability reuse and context binding.
  - id: M-PHASE-3
    title: Intake
    description: Make the request intake loop deterministic, including active work graph binding and coherence mode selection.
    target_date: 2026-05-14
    status: active
    vision_ref: V-ORGOS
    acceptance:
      - Request Intake Loop is defined as an Iron Law.
      - GOALS registry and coherence rubric remove subjective context handling.
  - id: M-PHASE-4
    title: Handoff
    description: Standardize delegation and completion packets so parallel work preserves assumptions, risks, and follow-up actions.
    target_date: 2026-05-21
    status: active
    vision_ref: V-ORGOS
    acceptance:
      - Handoff packet schema exists.
      - Downstream memory updates are explicit and safe.
  - id: M-PHASE-5
    title: Authority
    description: Integrate autonomy and approval logic so execution respects risk and ownership boundaries deterministically.
    target_date: 2026-05-31
    status: active
    vision_ref: V-ORGOS
    acceptance:
      - Authority layer schemas and rules exist.
      - Risk and approval decisions can be audited.

