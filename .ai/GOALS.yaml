vision:
  id: V-ORGOS
  statement: Chief of Staff OrgOS as an integrated operating model that compounds
    memory, optionality, intake discipline, handoff reliability, and authority-aware
    execution without storing secrets in tracked state.
  created_at: 2026-04-19
  updated_at: 2026-04-19
milestones:
- id: M-PHASE-1
  title: Memory
  description: Establish a safe fact registry and lifecycle so the system can remember
    relevant context without leaking secrets.
  target_date: 2026-04-30
  status: achieved
  vision_ref: V-ORGOS
  acceptance:
  - USER_PROFILE schema and lifecycle rule exist.
  - Secret material is represented by pointers, not plaintext.
- id: M-PHASE-2
  title: Optionality
  description: Build capability discovery and evaluation primitives so the manager
    can choose tools instead of asking the owner prematurely.
  target_date: 2026-05-07
  status: achieved
  vision_ref: V-ORGOS
  acceptance:
  - Capability manifest is machine-readable and reusable.
  - Quality eval can score capability reuse and context binding.
  notes: CAPABILITIES.yaml + pretool_policy.py invariant checks satisfy optionality
- id: M-PHASE-3
  title: Intake
  description: Make the request intake loop deterministic, including active work graph
    binding and coherence mode selection.
  target_date: 2026-05-14
  status: achieved
  vision_ref: V-ORGOS
  acceptance:
  - Request Intake Loop is defined as an Iron Law.
  - GOALS registry and coherence rubric remove subjective context handling.
  notes: request-intake-loop.md Iron Law + Step 3.5 Journey integration (T-OS-312)
- id: M-PHASE-4
  title: Handoff
  description: Standardize delegation and completion packets so parallel work preserves
    assumptions, risks, and follow-up actions.
  target_date: 2026-05-21
  status: achieved
  vision_ref: V-ORGOS
  acceptance:
  - Handoff packet schema exists.
  - Downstream memory updates are explicit and safe.
  notes: handoff-protocol.md schema + integrator-commit.sh + artifact_manifest
- id: M-PHASE-5
  title: Authority
  description: Integrate autonomy and approval logic so execution respects risk and
    ownership boundaries deterministically.
  target_date: 2026-05-31
  status: achieved
  vision_ref: V-ORGOS
  acceptance:
  - Authority layer schemas and rules exist.
  - Risk and approval decisions can be audited.
  notes: per-invariant kernel mode (T-OS-420) + 7 Constitutional Invariants + Owner
    approval framework
- id: M-PHASE-7
  title: Concurrent Execution Safety
  description: Prevent unintended branch switches and commit-to-wrong-branch incidents
    when multiple Claude Code sessions or Codex processes operate on the same repository
    in parallel.
  target_date: 2026-07-15
  status: achieved
  vision_ref: V-ORGOS
  acceptance:
  - parallel-session-policy rule defines safe operation modes for concurrent sessions.
  - pretool hook detects unintended branch switches before destructive git operations.
  - Codex CLI startup is wrapped to enforce git worktree isolation.
  - Coordination lock prevents simultaneous git mutations from multiple sessions.
  notes: 'kernel v2 (T-OS-410〜431) provides full concurrent execution safety: per-task
    worktree, lease registry, integrator gate, branch protection'
- id: M-PHASE-6
  title: Pre-Implementation Quality and Owner Sync
  description: Prevent the "implement-then-discover-CRITICAL" loop by forcing ToBe
    journey sync, quality contract, domain analysis, threat modeling, and acceptance
    pre-write before implementation begins.
  target_date: 2026-06-30
  status: achieved
  vision_ref: V-ORGOS
  acceptance:
  - Quality Contract protocol exists and is required before IMPLEMENTATION.
  - Journey-First protocol blocks function-list thinking before ToBe flow is confirmed.
  - DESIGN gate requires explicit threat model, full data model, and authority boundary.
  - Acceptance criteria are pre-written before Codex implementation.
  - Owner is explicitly engaged at five high-leverage touchpoints (journey, quality,
    domain, design, acceptance).
