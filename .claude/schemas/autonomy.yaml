# Autonomy Metadata Schema
#
# Purpose:
# - define allowed autonomy levels for task / work order metadata
# - provide deterministic mapping inputs for Step 5 -> Step 6 reduction

$schema: orgos/autonomy/v1
fields:
  autonomy_level:
    type: enum
    values: [silent_execute, execute_with_report, ask_before_execute, owner_only]
    required: true
  blast_radius:
    type: enum
    values: [single_file, multi_file, schema_change, iron_law, kernel]
    required: true
  owner_input_needed:
    type: array_of_enum
    values: [vision, budget, compliance, credentials, destructive_approval, none]
    required: true
  risk_level:
    type: enum
    values: [low, medium, high, critical]
    required: true
  default_if_no_response:
    type: enum
    values: [auto_apply, defer, escalate, no_op]
    required: false
  reversibility:
    type: enum
    values: [reversible, irreversible]
    required: true

schema:
  version: "1.0"
  type: object
  additional_properties: false
  required:
    - autonomy

autonomy:
  type: object
  additional_properties: false
  required:
    - levels
    - frontmatter
    - mapping_inputs
  fields:
    levels:
      type: array
      min_items: 4
      item:
        type: object
        additional_properties: false
        required:
          - id
          - description
          - decision_outcome
        fields:
          id:
            type: enum
            values:
              - silent_execute
              - execute_with_report
              - ask_before_execute
              - owner_only
          description:
            type: string
            min_length: 1
          decision_outcome:
            type: enum
            values:
              - act_silent
              - act_report
              - ask
              - ask_defer_or_refuse
          applicable_to:
            type: array
            default: []
            item:
              type: string
          examples:
            type: array
            default: []
            item:
              type: string
    frontmatter:
      type: object
      additional_properties: false
      required:
        - autonomy_level
      fields:
        autonomy_level:
          type: enum
          values:
            - silent_execute
            - execute_with_report
            - ask_before_execute
            - owner_only
        approval_required_for:
          type: array
          default: []
          item:
            type: string
        owner_input_needed:
          type: array
          default: []
          item:
            type: string
    mapping_inputs:
      type: object
      additional_properties: false
      required:
        - risk
        - reversibility
      fields:
        risk:
          type: enum
          values:
            - low
            - medium
            - high
            - critical
            - os_mutation_in_core
            - os_mutation_in_new
        reversibility:
          type: enum
          values:
            - reversible
            - irreversible
        security:
          type: enum
          values:
            - none
            - low
            - medium
            - high
        destructiveness:
          type: enum
          values:
            - silent
            - local
            - shared
            - external
        cost:
          type: enum
          values:
            - low
            - medium
            - high

examples:
  - task:
      id: T-OS-170
      autonomy_level: execute_with_report
      approval_required_for: []
      owner_input_needed: []
